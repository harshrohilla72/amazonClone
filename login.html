<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .logo1 {
            display: block;
            margin: 0 auto;
        }

        .signinbox {
            border: 1px solid rgb(220, 217, 217);
            border-radius: 7px;
            height: 340px;
            width: 340px;
            display: block;
            margin: 0 auto;

        }

        .box2 {
            margin-left: 20px;
            /* font-weight: bold; */
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 19px;
            margin-top: 15px;
        }

        .contactinfo {
            font-weight: bold;
            margin-top: 20px;
            margin-left: 20px;
        }

        .form1 {
            width: 290px;
            height: 32px;
            border-radius: 2px;
            border: 1px solid gray;
            margin-top: 5px;
            box-shadow: 1px 1px gray;
        }

        .continue {
            background-color: rgb(249, 243, 63);
            border: 0px solid white;
            border-radius: 20px;
            display: block;
            margin: 0 auto;
            width: 290px;
            height: 32px;
            /* padding: 10px; */
            margin-top: 10px;
        }

        .privacy {
            font-size: 15px;
            width: 290px;
            margin: auto;
            margin-top: 20px;
        }

        .hr {
            width: 290px;
            border: 1px solid rgb(214, 211, 211);
        }

        .work {
            margin-left: 22px;
            font-weight: bold;
        }

        .footer {
            text-align: center;

        }

        .login {
            background-color: rgb(249, 243, 63);
            width: 80px;
            height: 35px;
            margin-left: 20px;
            border-radius: 10px;
            border: 0px solid white;

        }

        .password {
            margin-left: 20px;
            font-weight: bold;

        }
    </style>
</head>

<body>
    <a href="trial.html"> <img src="amazonlogo2.png" alt="" class="logo1"></a>

    <div class="signinbox">
        <div class="box2">
            Log in
        </div>
        <div class="contactinfo">
            Enter mobile number or email <br>
            <input class="form1" type="search" placeholder="">

        </div>
        <div class="password">
            Enter password <br>
            <input class="form1" type="search" placeholder="">

        </div>
        <div>
            <button class="continue">Continue</button>
        </div>
        <div class="privacy">
            By continuing, you agree to Amazon's <span><a href="">Conditions of Use</a></span> and <span><a
                    href=""> Privacy Notice </a></span>
        </div>
        <hr class="hr">
        <div class="work">
            Create a new account.

            <a href="signin.html"><button class="login"> Sign in</button></a>

        </div>

    </div>
    <hr style="margin-top: 50px;">
    <div class="footer">
        <a href="Condition of use" style="text-decoration: none;">Condition of use</a> &emsp; <a href="Privacy Notice"
            style="text-decoration: none;">Privacy Notice</a> &emsp; <a href="Help"
            style="text-decoration: none;">Help</a>
    </div>

</body>

</html>
